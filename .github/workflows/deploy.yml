# Publie le contenu du dépôt tel quel sur GitHub Pages.
# Le site est statique : rien à construire, on téléverse le dossier.
#
# Prérequis côté dépôt : Settings → Pages → Source = « GitHub Actions ».
# Le domaine personnalisé vient du fichier CNAME à la racine.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; les runs en attente sont abandonnés au profit
# du plus récent.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
